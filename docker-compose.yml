version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vlaggen_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vlaggen_db
    ports:
      - "5432:5432" # Optional to expose for local dev inspection, else remove
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - vlaggen_net
    restart: always

  backend:
    build: .
    container_name: vlaggen_api
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://admin:password@db:5432/vlaggen_db
      - PORT=5000
    volumes:
      - img_vol:/app/uploads # Persistent volume for image uploads, ensuring statelessness
    networks:
      - vlaggen_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Placeholder for frontend applications (in this case, single container mapping multiple apps, or separate containers)
  frontend-nl:
    image: nginx:alpine
    container_name: vlaggen_frontend_nl
    ports:
      - "8080:80" # Exposed to public internet via host port
    depends_on:
      - backend
    networks:
      - vlaggen_net

  frontend-en:
    image: nginx:alpine
    container_name: vlaggen_frontend_en
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - vlaggen_net

networks:
  vlaggen_net:
    driver: bridge

volumes:
  db_data: # Database persistency
  img_vol: # Image uploads persistency
